image:
  name: gcr.io/kaniko-project/executor:debug
  entrypoint: [""]

stages:
  # - django_test
  - integration_test

# include:
#   - project: plos/gcp-global
#     file: /gitlab-ci-tf.yml

variables:
  WORKDIR: "/tmp/editorial_manager_transfer_service"
  JANEWAY_PATH: "$WORKDIR/janeway"
  PLUGIN_PATH: "$JANEWAY_PATH/src/plugins/editorial_manager_transfer_service"
  DJANGO_SETTINGS_MODULE: "core.settings" # is this required? looks unused
  JANEWAY_SETTINGS_MODULE: "core.settings" # is this required? looks unused
  PYTHONPATH: "$JANEWAY_PATH/src" # is this required? looks unused
  GOOGLE_BACKEND_CREDENTIALS: ${GCR_AUTH_JSON_FILE}

before_script:
  - export GOOGLE_APPLICATION_CREDENTIALS=$GCR_AUTH_JSON_FILE
  - apt-get update -qq && apt-get install -y git
  - mkdir -p $WORKDIR
  - cd $WORKDIR
  # Clone Janeway
  - git clone --branch develop https://github.com/PLOS/janeway.git $JANEWAY_PATH
  # Copy this plugin into Janeway plugins folder
  - mkdir -p $PLUGIN_PATH
  - cp -r $CI_PROJECT_DIR/* $PLUGIN_PATH/
  # Install dependencies
  - python -m pip install --upgrade pip
  - find $WORKDIR -name "*requirements.txt" -type f -exec pip install -r '{}' ';'
  # Import Janeway dev settings
  - cp $JANEWAY_PATH/src/core/dev_settings.py $JANEWAY_PATH/src/core/settings.py

