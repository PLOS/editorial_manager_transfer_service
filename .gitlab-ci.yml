# --------------------------------------------
# Integration tests
# --------------------------------------------
integration_tests:
  stage: integration_test
  image: gcr.io/plos-mgmt/plos-test:python-3-11
  tags:
    - dev
    - gke
  # extends:
  #   - .dev
  variables:
    WEBDRIVER_HEADLESS: "True"
  before_script:
    - export GOOGLE_APPLICATION_CREDENTIALS=$GCR_AUTH_JSON_FILE
  script:
    - python --version
    - firefox -v
    - geckodriver -V
    - cd tests
    - mkdir ./pytest_report
    - pipenv install
    - pipenv run pytest -v -n auto -l --reruns 1 --reruns-delay 3 --timeout=600 --html='./pytest_report/pytest_report.html' 
  artifacts:
    when: always
    paths:
      - tests/pytest_report/
