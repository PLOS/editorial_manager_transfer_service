include:
  - project: plos/gcp-global
    file: /gitlab-ci-k8s+tf.yml

workflow:
  rules:
    - when: always

stages:
  - build
  - prep cloud function
  - static analysis
  - test
  - plan
  - dev deploy
  - integration test
  - prod deploy

variables:
  PYTHON_VERSION: "3.10.15"
  WORKDIR: "/tmp/editorial_manager_transfer_service"
  JANEWAY_PATH: "$WORKDIR/janeway"
  PLUGIN_PATH: "$JANEWAY_PATH/src/plugins/editorial_manager_transfer_service"
  DJANGO_SETTINGS_MODULE: "core.settings"
  JANEWAY_SETTINGS_MODULE: "core.settings"
  PYTHONPATH: "$JANEWAY_PATH/src"
  # Google Backend Credentials is required for the integration test image
  GOOGLE_BACKEND_CREDENTIALS: ${GCR_AUTH_JSON_FILE}
  DOCKER_HOST: tcp://localhost:2375
  DOCKER_TLS_CERTDIR: ""

default:
  before_script:
      - |
        if [ -f "$GCR_AUTH_JSON_FILE" ]; then
          cat "$GCR_AUTH_JSON_FILE" | docker login -u _json_key --password-stdin https://gcr.io
        fi

# --------------------------------------------
# Build stage placeholder
# --------------------------------------------
build_placeholder:
  stage: build
  script:
    - echo "Build stage - add your build steps here"

# --------------------------------------------
# Prep cloud function stage placeholder
# --------------------------------------------
prep_cloud_function_placeholder:
  stage: prep cloud function
  script:
    - echo "Prep cloud function stage - add your preparation steps here"

# --------------------------------------------
# Static analysis stage placeholder
# --------------------------------------------
static_analysis_placeholder:
  stage: static analysis
  script:
    - echo "Static analysis stage - add your linting/analysis steps here"

# --------------------------------------------
# Test stage placeholder
# --------------------------------------------
test_placeholder:
  stage: test
  script:
    - echo "Test stage - add your unit tests here"

# --------------------------------------------
# Plan stage placeholder
# --------------------------------------------
plan_placeholder:
  stage: plan
  script:
    - echo "Plan stage - add your terraform/deployment planning here"

# --------------------------------------------
# Dev deploy stage placeholder
# --------------------------------------------
dev_deploy_placeholder:
  stage: dev deploy
  script:
    - echo "Dev deploy stage - add your dev deployment steps here"

# --------------------------------------------
# Integration tests
# --------------------------------------------
integration_tests:
  stage: integration test
  image: gcr.io/plos-mgmt/plos-test:python-3-11
  script:
    - cd tests/integration
    - mkdir -p ./pytest_report
    - pipenv install
    - pipenv run pytest -v -l --reruns 3 --reruns-delay 3 --timeout=600 \
        --html='./pytest_report/pytest_report.html' api/
  rules:
    - when: on_success

# --------------------------------------------
# Prod deploy stage placeholder
# --------------------------------------------
prod_deploy_placeholder:
  stage: prod deploy
  script:
    - echo "Prod deploy stage - add your production deployment steps here"