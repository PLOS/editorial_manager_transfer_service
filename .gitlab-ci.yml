include:
  - project: 'dependabot-gitlab/dependabot-standalone'
    file: '.gitlab-ci.yml'
  - project: plos/gcp-global
    file: /gitlab-ci-k8s+tf.yml
  - template: Security/SAST.gitlab-ci.yml

stages:
  - plan
  - static analysis
  - test
  - integration
  - dev deploy
  
variables:
  PYTHON_VERSION: "3.10.15"
  WORKDIR: "/tmp/editorial_manager_transfer_service"
  JANEWAY_PATH: "$WORKDIR/janeway"
  PLUGIN_PATH: "$JANEWAY_PATH/src/plugins/editorial_manager_transfer_service"
  DJANGO_SETTINGS_MODULE: "core.settings"
  JANEWAY_SETTINGS_MODULE: "core.settings"
  PYTHONPATH: "$JANEWAY_PATH/src"
  # Google Backend Credentials is required for the integration test image
  GOOGLE_BACKEND_CREDENTIALS: ${GCR_AUTH_JSON_FILE}
  DOCKER_HOST: tcp://localhost:2375
  DOCKER_TLS_CERTDIR: ""

default:
  before_script:
      - |
        if [ -f "$GCR_AUTH_JSON_FILE" ]; then
          cat "$GCR_AUTH_JSON_FILE" | docker login -u _json_key --password-stdin https://gcr.io
        fi

# --------------------------------------------
# Integration tests
# --------------------------------------------
integration_tests:
  stage: integration
  image: gcr.io/plos-mgmt/plos-test:python-3-11
  script:
    - cd tests/integration
    - mkdir -p ./pytest_report
    - pipenv install
    - pipenv run pytest -v -l --reruns 3 --reruns-delay 3 --timeout=600 \
        --html='./pytest_report/pytest_report.html' api/
