stages:
  - integration_test

variables:
  GOOGLE_BACKEND_CREDENTIALS: ${GCR_AUTH_JSON_FILE}

before_script:
  - export GOOGLE_APPLICATION_CREDENTIALS=$GCR_AUTH_JSON_FILE

# --------------------------------------------
# Integration tests
# --------------------------------------------
integration_tests:
  stage: integration_test
  image: gcr.io/plos-mgmt/plos-test:python-3-11
  script:
    - cd tests/integration
    - mkdir -p ./pytest_report
    - pipenv install
    - pipenv run pytest -v -l --reruns 3 --reruns-delay 3 --timeout=600 \
        --html='./pytest_report/pytest_report.html' api/